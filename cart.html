<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - V~Leaf</title>

<style>
body { margin:0; font-family:sans-serif; background:#fff; }

nav { padding:15px 30px; border-bottom:1px solid #eee; }

.container { padding:30px 10%; }

.item {
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.item img { width:60px; border-radius:10px; }

.info { flex:1; }

.actions { display:flex; gap:5px; }

.total { margin-top:20px; font-size:18px; }

button {
  padding:12px;
  border:none;
  background:#39FF14;
  font-weight:bold;
  border-radius:20px;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.modal input {
  width:100%;
  margin-bottom:10px;
  padding:8px;
}
</style>
</head>

<body>

<nav><strong>Cart</strong></nav>

<div class="container">

  <div id="cart"></div>

  <div class="total" id="total"></div>

  <button onclick="openCheckout()">Checkout</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div style="display:flex; justify-content:space-between;">
      <h3>Checkout</h3>
      <span onclick="closeModal()" style="cursor:pointer;">✕</span>
    </div>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <button onclick="confirmCheckout()">Confirm Order</button>
  </div>
</div>

<script type="module">
import { supabase } from "./supabase.js"

let cartItems = []
let selectedItems = []

async function loadCart(){

  const { data: userData } = await supabase.auth.getUser()

  if(!userData.user){
    document.getElementById("cart").innerText = "Login required"
    return
  }

  const user = userData.user

  const { data } = await supabase
    .from("cart")
    .select("*")
    .eq("user_id", user.id)

  cartItems = data || []

  let html = ""
  let total = 0

  for(let item of cartItems){

    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    if(!product) continue

    const subtotal = product.price * item.quantity
    total += subtotal

    html += `
      <div class="item">
        <input type="checkbox" onchange="toggleItem('${item.id}')">

        <img src="${product.image}">

        <div class="info">
          <h4>${product.name}</h4>
          <p>$${product.price}</p>
          <p>Size: ${item.size}</p>
        </div>

        <div class="actions">
  <input type="number" value="${item.quantity}"
    onchange="updateQty('${item.id}', this.value)">

  <button class="remove" onclick="removeItem('${item.id}')">X</button>
</div>
    `
  }

  document.getElementById("cart").innerHTML = html
  document.getElementById("total").innerText = "Cart total: $" + total
}

/* SELECT ITEMS */
window.toggleItem = function(id){
  if(selectedItems.includes(id)){
    selectedItems = selectedItems.filter(i => i !== id)
  } else {
    selectedItems.push(id)
  }
}
/* REMOVE ITEMS */
  window.removeItem = async function(id){
  await supabase
    .from("cart")
    .delete()
    .eq("id", id)

  loadCart()
}
/* OPEN MODAL */
window.openCheckout = async function(){

  if(selectedItems.length === 0){
    alert("Select items")
    return
  }

  const { data: userData } = await supabase.auth.getUser()
  const user = userData.user

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single()

  document.getElementById("name").value = profile?.full_name || ""
  document.getElementById("phone").value = profile?.phone || ""
  document.getElementById("address").value = profile?.address || ""

  document.getElementById("modal").style.display = "flex"
}
window.closeModal = function(){
  document.getElementById("modal").style.display = "none"
}

/* fermer si clic dehors */
window.onclick = function(e){
  const modal = document.getElementById("modal")
  if(e.target === modal){
    modal.style.display = "none"
  }
}
/* CONFIRM */
window.confirmCheckout = async function(){

  const name = document.getElementById("name").value
  const phone = document.getElementById("phone").value
  const address = document.getElementById("address").value

  const { data: userData } = await supabase.auth.getUser()
  const user = userData.user

  let total = 0
  let itemsToBuy = cartItems.filter(i => selectedItems.includes(i.id))

  for(let item of itemsToBuy){

    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    total += product.price * item.quantity
  }

  const { data: order } = await supabase
    .from("orders")
    .insert({
      user_id: user.id,
      total,
      status:"pending",
      name,
      phone,
      address
    })
    .select()
    .single()

  for(let item of itemsToBuy){

    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    await supabase.from("order_items").insert({
      order_id: order.id,
      product_id: item.product_id,
      quantity: item.quantity,
      price: product.price,
      size: item.size
    })
  }

  // remove only selected items
  for(let id of selectedItems){
    await supabase.from("cart").delete().eq("id", id)
  }

  // UPDATE PROFILE
  await supabase.from("profiles").upsert({
    id: user.id,
    full_name: name,
    phone,
    address
  })

  // WHATSAPP
  let msg = `Order ${order.id}%0A`

  for(let item of itemsToBuy){
    msg += `ID:${item.product_id} Qty:${item.quantity}%0A`
  }

  msg += `Total:$${total}`

  window.location.href =
    "https://wa.me/50941040511?text=" + msg
}

loadCart()
</script>

</body>
</html>
