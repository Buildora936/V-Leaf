<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - V~Leaf</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
}

/* NAV */
nav {
  padding: 15px 30px;
  border-bottom: 1px solid #eee;
}

/* CONTAINER */
.container {
  padding: 30px 10%;
}

/* ITEM */
.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
  padding: 15px 0;
}

.item img {
  width: 70px;
  border-radius: 10px;
}

/* INFO */
.info {
  flex: 1;
  margin-left: 15px;
}

/* ACTIONS */
.actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.actions input {
  width: 50px;
}

/* BUTTON */
button {
  padding: 12px;
  border: none;
  background: #39FF14;
  font-weight: bold;
  cursor: pointer;
  border-radius: 20px;
}

/* REMOVE */
.remove {
  background: black;
  color: white;
}

/* TOTAL */
.total {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* CHECKOUT */
.checkout {
  margin-top: 20px;
  width: 100%;
}
</style>
</head>

<body>

<nav>
  <strong>Cart</strong>
</nav>

<div class="container">
  <div id="cart">Loading...</div>

  <div class="total" id="total"></div>

  <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script type="module">
import { supabase } from "./supabase.js"

let cartItems = []

async function loadCart() {

  const { data: userData } = await supabase.auth.getUser()

  if (!userData.user) {
    document.getElementById("cart").innerText = "Login required"
    return
  }

  const user = userData.user

  const { data: cart } = await supabase
    .from("cart")
    .select("*")
    .eq("user_id", user.id)

  cartItems = cart || []

  let html = ""
  let total = 0

  for (let item of cartItems) {

    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    const subtotal = product.price * item.quantity
    total += subtotal

    html += `
      <div class="item">
        <img src="${product.image || ''}">

        <div class="info">
          <h4>${product.name}</h4>
          <p>$${product.price}</p>
          <p>Size: ${item.size || "-"}</p>
        </div>

        <div class="actions">
          <input type="number" value="${item.quantity}" min="1"
            onchange="updateQty('${item.id}', this.value)">

          <button class="remove" onclick="removeItem('${item.id}')">X</button>
        </div>
      </div>
    `
  }

  document.getElementById("cart").innerHTML = html
  document.getElementById("total").innerText = "Total: $" + total
}

/* UPDATE QTY */
window.updateQty = async function(id, qty) {
  await supabase
    .from("cart")
    .update({ quantity: qty })
    .eq("id", id)

  loadCart()
}

/* REMOVE */
window.removeItem = async function(id) {
  await supabase
    .from("cart")
    .delete()
    .eq("id", id)

  loadCart()
}

/* CHECKOUT */
window.checkout = async function() {

  const { data: userData } = await supabase.auth.getUser()
  const user = userData.user

  if (!user) {
    alert("Login required")
    return
  }

  let total = 0

  for (let item of cartItems) {
    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    total += product.price * item.quantity
  }

  // CREATE ORDER
  const { data: order } = await supabase
    .from("orders")
    .insert({
      user_id: user.id,
      total: total,
      status: "pending"
    })
    .select()
    .single()

  // ORDER ITEMS
  for (let item of cartItems) {

    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    await supabase.from("order_items").insert({
      order_id: order.id,
      product_id: item.product_id,
      quantity: item.quantity,
      price: product.price,
      size: item.size
    })
  }

  // CLEAR CART
  await supabase
    .from("cart")
    .delete()
    .eq("user_id", user.id)

  // WHATSAPP MESSAGE
  let message = "Hello, I want to pay this order:%0A"

  for (let item of cartItems) {
    message += `Product ID: ${item.product_id} Qty: ${item.quantity}%0A`
  }

  message += `Total: $${total}%0AOrder ID: ${order.id}`

  window.location.href =
    "https://wa.me/50941040511?text=" + message
}

loadCart()
</script>

</body>
</html>
