<!DOCTYPE html>
<html>
<head>
  <title>V~Leaf Cart</title>

  <style>
    body {
      background:#0b0f0c;
      color:white;
      font-family: Arial;
      padding:20px;
    }

    h1 {
      color:#39FF14;
      text-shadow:0 0 10px #39FF14;
    }

    .item {
      border:1px solid #39FF14;
      padding:10px;
      margin:10px 0;
    }

    button {
      background:#39FF14;
      border:none;
      padding:10px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>Mon Panier</h1>

<div id="cart"></div>

<script type="module">
import { supabase } from "./supabase.js"

async function loadCart() {

  const { data: userData } = await supabase.auth.getUser()

  if (!userData.user) {
    document.getElementById("cart").innerText = "Connecte-toi"
    return
  }

  const user = userData.user

  const { data: cart } = await supabase
    .from("cart")
    .select("*")
    .eq("user_id", user.id)

  let html = ""

  for (let item of cart) {

    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    html += `
      <div class="item">
        <h3>${product.name}</h3>
        <p>$${product.price}</p>
      </div>
    `
  }

  document.getElementById("cart").innerHTML = html
}

loadCart()
</script>

</body>
</html>
