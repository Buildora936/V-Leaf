<!DOCTYPE html>
<html>
<head>
  <title>V~Leaf Cart</title>

  <style>
    body {
      background:#0b0f0c;
      color:white;
      font-family: Arial;
      padding:20px;
    }

    h1 {
      color:#39FF14;
      text-shadow:0 0 10px #39FF14;
    }

    .item {
      border:1px solid #39FF14;
      padding:10px;
      margin:10px 0;
    }

    button {
      background:#39FF14;
      border:none;
      padding:10px;
      cursor:pointer;
      margin-top:10px;
    }
  </style>
</head>

<body>

<h1>Mon Panier</h1>

<div id="cart"></div>

<h2 id="total"></h2>

<button onclick="checkout()">Commander</button>

<script type="module">
import { supabase } from "./supabase.js"

let cartItems = []

async function loadCart() {

  const { data: userData } = await supabase.auth.getUser()

  if (!userData.user) {
    document.getElementById("cart").innerText = "Connecte-toi"
    return
  }

  const user = userData.user

  const { data: cart } = await supabase
    .from("cart")
    .select("*")
    .eq("user_id", user.id)

  cartItems = cart

  let html = ""
  let total = 0

  for (let item of cart) {

    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    total += product.price * item.quantity

    html += `
      <div class="item">
        <h3>${product.name}</h3>
        <p>$${product.price}</p>
      </div>
    `
  }

  document.getElementById("cart").innerHTML = html
  document.getElementById("total").innerText = "Total : $" + total
}

window.checkout = async function() {

  const { data: userData } = await supabase.auth.getUser()
  const user = userData.user

  if (!user) {
    alert("Connecte-toi")
    return
  }

  // 1. calcul total
  let total = 0

  for (let item of cartItems) {
    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    total += product.price * item.quantity
  }

  // 2. créer commande
  const { data: order } = await supabase
    .from("orders")
    .insert({
      user_id: user.id,
      total: total,
      status: "pending"
    })
    .select()
    .single()

  // 3. ajouter produits dans order_items
  for (let item of cartItems) {

    const { data: product } = await supabase
      .from("products")
      .select("*")
      .eq("id", item.product_id)
      .single()

    await supabase.from("order_items").insert({
      order_id: order.id,
      product_id: item.product_id,
      quantity: item.quantity,
      price: product.price
    })
  }

  // 4. vider panier
  await supabase
    .from("cart")
    .delete()
    .eq("user_id", user.id)

  alert("Commande créée !")

  loadCart()
}

loadCart()
</script>

</body>
</html>
