<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - V~Leaf</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* CONTAINER */
.container {
  max-width:600px;
  margin:60px auto;
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
}

/* TITLE */
h1 {
  margin-bottom:10px;
}

/* TEXT */
p {
  color:#666;
}

/* BUTTON */
.btn {
  margin-top:20px;
  display:inline-block;
  padding:15px 25px;
  background:#39FF14;
  color:black;
  text-decoration:none;
  font-weight:bold;
  border-radius:30px;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
}

/* INFO */
.info {
  margin-top:30px;
  font-size:14px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">

  <h1>Contact Us</h1>

  <p>
    Have a question about your order or product?  
    Our team is ready to help you.
  </p>

  <!-- WHATSAPP BUTTON -->
  <a class="btn"
     href="https://wa.me/50941040511?text=Hello%20V~Leaf,%20I%20need%20help"
     target="_blank">
     Chat on WhatsApp
  </a>

  <div class="info">
    <p>WhatsApp: +509 41 04 0511</p>
    <p>Response time: usually within a few hours</p>
  </div>

</div>

</body>
</html>
