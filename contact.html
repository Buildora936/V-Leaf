<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - V~Leaf</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* CONTAINER */
.container {
  max-width:600px;
  margin:60px auto;
  background:white;
  padding:40px;
  border-radius:15px;
  text-align:center;
}

/* TITLE */
h1 {
  margin-bottom:10px;
}

/* TEXT */
p {
  color:#555;
}

/* BUTTON */
button {
  margin-top:20px;
  padding:15px 25px;
  border:none;
  background:#39FF14;
  font-weight:bold;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  opacity:0.8;
}

/* SECOND BUTTON */
.secondary {
  margin-top:10px;
  background:black;
  color:white;
}
</style>
</head>

<body>

<div class="container">

  <h1>Contact Us</h1>

  <p>
    For any questions about orders, shipping, or products,
    our support team is available on WhatsApp.
  </p>

  <button onclick="openWhatsApp()">
    Start WhatsApp Chat
  </button>

  <br>

  <button class="secondary" onclick="openWhatsApp()">
    Go to Discussions
  </button>

</div>

<script>
function openWhatsApp(){
  window.location.href = "https://wa.me/50941040511"
}
</script>

</body>
</html>
