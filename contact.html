<!DOCTYPE html>
<html>
<head>
  <title>Contact V~Leaf</title>

  <!-- ICONES -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color:white;
      padding:20px;
      padding-bottom:80px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    h1 {
      margin-bottom:20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius:20px;
      padding:30px;
      text-align:center;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
    }

    .btn {
      margin-top:20px;
      background:#25D366;
      border:none;
      padding:15px 20px;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      color:white;
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
    }

    /* NAV BAS */
    .nav {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:#111;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
    }

    .nav a {
      color:white;
      text-decoration:none;
      font-size:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .nav i {
      font-size:18px;
      color:#39FF14;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body>

<h1>Contact</h1>

<div class="card">
  <p>Besoin d’aide ou une question ?</p>
  <p>Contacte-nous directement sur WhatsApp</p>

  <button class="btn" onclick="contactWhatsApp()">
    <i class="fa fa-whatsapp"></i>
    Contacter sur WhatsApp
  </button>
</div>

<!-- NAVIGATION BAS -->
<div class="nav">
  <a href="shop.html"><i class="fa fa-store"></i>Shop</a>
  <a href="cart.html"><i class="fa fa-cart-shopping"></i>Cart</a>
  <a href="orders.html"><i class="fa fa-box"></i>Orders</a>
  <a href="profile.html"><i class="fa fa-user"></i>Profile</a>
</div>

<script>
function contactWhatsApp() {
  const number = "50941040511"
  const message = "Bonjour V~Leaf, j'ai une question."
  const url = `https://wa.me/${number}?text=${encodeURIComponent(message)}`
  window.open(url, "_blank")
}
</script>

</body>
</html>
