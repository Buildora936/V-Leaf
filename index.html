<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V~Leaf</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: #000;
}

/* NAVBAR */
nav {
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.7);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  z-index: 100;
}

nav img {
  height: 40px;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: black;
  font-weight: 600;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 10%;
  background: linear-gradient(180deg, #ffffff, #f5f5f5);
}

.hero h1 {
  font-size: 64px;
  max-width: 600px;
}

.hero button {
  margin-top: 25px;
  padding: 15px 35px;
  border: none;
  background: #39FF14;
  font-weight: bold;
  cursor: pointer;
  border-radius: 50px;
}

/* SECTION */
.section-title {
  font-size: 30px;
  margin: 80px 10% 30px;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  padding: 0 10%;
}

/* CARD */
.card {
  background: white;
  border-radius: 25px;
  overflow: hidden;
  transition: 0.4s;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-12px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card-content {
  padding: 20px;
}

.card h3 {
  margin: 0;
}

.card p {
  margin-top: 5px;
  color: #666;
}

/* FOOTER */
footer {
  margin-top: 100px;
  padding: 40px;
  text-align: center;
  border-top: 1px solid #eee;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <img src="V-Leaf logo.png">

  <div>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Elevate Every Step.</h1>
  <button onclick="goShop()">Shop Now</button>
</section>

<!-- PRODUCTS -->
<h2 class="section-title">Latest Drops</h2>

<div class="products" id="product-list">
  <!-- PRODUITS DYNAMIQUES -->
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 V~Leaf</p>
</footer>

<script type="module">
import { getAllProducts } from "./data.js";

function goShop(){
  window.location.href = "shop.html";
}

function goProduct(id){
  window.location.href = "product.html?id=" + id;
}

/* LOAD PRODUITS */
async function loadProducts(){
  const container = document.getElementById("product-list");

  container.innerHTML = "Loading...";

  try {
    const { jetprint, manual } = await getAllProducts();

    // Combine les produits
    const products = [
      ...(manual || [])
    ];

    if(products.length === 0){
      container.innerHTML = "<p style='padding:20px'>No products yet</p>";
      return;
    }

    container.innerHTML = products.map(p => `
      <div class="card" onclick="goProduct('${p.id}')">
        <img src="${p.image_url}">
        <div class="card-content">
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
        </div>
      </div>
    `).join("");

  } catch(err){
    console.error(err);
    container.innerHTML = "<p>Error loading products</p>";
  }
}

loadProducts();
</script>

</body>
</html>
