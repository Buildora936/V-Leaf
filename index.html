<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V~Leaf</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: #000;
}

/* NAVBAR */
.topbar{
  display:flex;
  align-items:center;
  gap:15px;
  padding:12px 20px;
  background:white;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  width:40px;
}

.search{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:#f5f5f5;
  padding:8px 12px;
  border-radius:30px;
  transition:0.3s;
}

.search:focus-within{
  background:#eee;
}

.search input{
  border:none;
  outline:none;
  background:transparent;
  width:100%;
}

.nav-btn{
  background:#39FF14;
  padding:8px 15px;
  border-radius:20px;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

.icon-link{
  font-size:20px;
  color:black;
}
/* HERO */
.hero {
  height: 85vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 10%;
  background: linear-gradient(180deg, #ffffff, #f5f5f5);
}

.hero h1{
  animation: fadeUp 0.8s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.hero button {
  margin-top: 25px;
  padding: 15px 35px;
  border: none;
  background: #39FF14;
  font-weight: bold;
  cursor: pointer;
  border-radius: 50px;
  transition: 0.3s;
}

.hero button:hover {
  transform: scale(1.05);
}

/* TITLE */
.section-title {
  font-size: 30px;
  margin: 80px 10% 30px;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  padding: 0 10%;
}

/* CARD */
.card {
  background: white;
  border-radius: 25px;
  overflow: hidden;
  transition: 0.4s;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-12px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.05);
}

.card-content {
  padding: 20px;
}

.card h3 {
  margin: 0;
}

.card p {
  margin-top: 5px;
  color: #666;
}

/* LOADING */
.loading {
  text-align: center;
  padding: 40px;
  color: #999;
}

/* BANNER */
.banner {
  margin: 100px 10%;
  padding: 70px;
  border-radius: 30px;
  background: linear-gradient(135deg, black, #1a1a1a);
  color: white;
}

/* FOOTER */
footer {
  margin-top: 100px;
  padding: 40px;
  text-align: center;
  border-top: 1px solid #eee;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<div class="topbar">

  <div style="display:flex; align-items:center; gap:10px;">
    <img src="V-Leaf logo.png" class="logo">
    <strong style="font-size:18px;">V~Leaf</strong>
  </div>

  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchInput" type="text" placeholder="Search products...">
  </div><script>
const input = document.getElementById("searchInput")

input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const value = this.value.trim()
    if(!value) return

    window.location.href =
      "shop.html?search=" + encodeURIComponent(value)
  }
})
</script>

  <div id="nav-right" style="display:flex; gap:15px; align-items:center;"></div>

</div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Elevate Every Step.</h1>
   <button onclick="goShop()">Shop Now</button>  
</section>

<!-- PRODUCTS -->
<h2 class="section-title">Latest Drops</h2>

<div class="products" id="products">
  <div class="loading">Loading products...</div>
</div>

<!-- BANNER -->
<section class="banner">
  <h2>Premium Quality. Accessible Price.</h2>
  <p>Designed for those who move different.</p>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 V~Leaf</p>
</footer>

<!-- SCRIPT SUPABASE -->
<script type="module">
import { supabase } from "./supabase.js"

async function loadProducts() {

  const { data, error } = await supabase
    .from("products")
    .select("*")
    .limit(6)

  if(error){
    document.getElementById("products").innerHTML = "Error loading products"
    return
  }

  if(!data || data.length === 0){
    document.getElementById("products").innerHTML = "No products yet"
    return
  }

  let html = ""

  data.forEach(p => {
    html += `
      <div class="card" onclick="viewProduct('${p.id}')">
        <img src="${p.image || ''}">
        <div class="card-content">
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
        </div>
      </div>
    `
  })

  document.getElementById("products").innerHTML = html
}

window.viewProduct = function(id) {
  window.location.href = "product.html?id=" + id
}
async function goShop(){  
  window.location.href = "shop.html"  
}  
async function loadNav(){

  const { data } = await supabase.auth.getUser()
  const nav = document.getElementById("nav-right")

  if(data.user){

    nav.innerHTML = `
      <a href="cart.html" class="icon-link">
        <i class="fa-solid fa-cart-shopping"></i>
      </a>

      <a href="profile.html" class="icon-link">
        <i class="fa-solid fa-user"></i>
      </a>
    `

  } else {

    nav.innerHTML = `
      <a href="register.html" class="nav-btn">
        Sign Up
      </a>
    `
  }
}

loadProducts()
loadNav()
</script>

</body>
</html>
