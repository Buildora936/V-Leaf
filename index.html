<!DOCTYPE html>

<head>

  <title>V~Leaf</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      border-bottom: 1px solid #eee;
    }

    nav img {
      height: 40px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .hero button {
      padding: 15px 30px;
      border: none;
      background: #39FF14;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    /* PRODUCT */
    .product {
      text-align: center;
      padding: 50px 20px;
    }

    .product img {
      max-width: 300px;
    }

    .product h2 {
      margin: 10px 0;
    }

    .product button {
      padding: 12px 25px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #eee;
      margin-top: 50px;
    }

    @media(max-width: 600px) {
      .hero h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
