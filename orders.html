<!DOCTYPE html>
<html>
<head>
  <title>V~Leaf Orders</title>

  <!-- ICONES -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color:white;
      padding:20px;
      padding-bottom:80px;
    }

    h1 {
      text-align:center;
      margin-bottom:20px;
    }

    .order {
      background: rgba(255,255,255,0.05);
      border-radius:15px;
      padding:15px;
      margin-bottom:15px;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
    }

    .item {
      background: rgba(255,255,255,0.08);
      border-radius:10px;
      padding:10px;
      margin-top:10px;
    }

    .status {
      color:#39FF14;
      font-weight:bold;
    }

    /* NAV BAS */
    .nav {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:#111;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
      border-top:1px solid #39FF14;
    }

    .nav a {
      color:white;
      text-decoration:none;
      font-size:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .nav i {
      font-size:18px;
      margin-bottom:3px;
      color:#39FF14;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body>

<h1>Mes Commandes</h1>

<div id="orders"></div>

<!-- NAVIGATION BAS -->
<div class="nav">
  <a href="shop.html"><i class="fa fa-store"></i>Shop</a>
  <a href="cart.html"><i class="fa fa-cart-shopping"></i>Cart</a>
  <a href="orders.html"><i class="fa fa-box"></i>Orders</a>
  <a href="profile.html"><i class="fa fa-user"></i>Profile</a>
</div>

<script type="module">
import { supabase } from "./supabase.js"

async function loadOrders() {

  const { data: userData } = await supabase.auth.getUser()

  if (!userData.user) {
    document.getElementById("orders").innerText = "Connecte-toi"
    return
  }

  const user = userData.user

  const { data: orders } = await supabase
    .from("orders")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false })

  let html = ""

  for (let order of orders) {

    html += `
      <div class="order">
        <h3>Commande #${order.id}</h3>
        <p>Total : $${order.total}</p>
        <p class="status">${order.status}</p>
    `

    const { data: items } = await supabase
      .from("order_items")
      .select("*")
      .eq("order_id", order.id)

    for (let item of items) {

      const { data: product } = await supabase
        .from("products")
        .select("*")
        .eq("id", item.product_id)
        .single()

      html += `
        <div class="item">
          <p><b>${product.name}</b></p>
          <p>$${item.price} x ${item.quantity}</p>
        </div>
      `
    }

    html += `</div>`
  }

  document.getElementById("orders").innerHTML = html
}

loadOrders()
</script>

</body>
</html>
