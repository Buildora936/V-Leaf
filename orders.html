<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - V~Leaf</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* CONTAINER */
.container {
  max-width:800px;
  margin:30px auto;
  padding:20px;
}

/* ORDER CARD */
.order {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* HEADER */
.order-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* STATUS */
.status {
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.pending { background:orange; color:white; }
.paid { background:green; color:white; }
.shipped { background:black; color:white; }

/* ITEM */
.item {
  display:flex;
  align-items:center;
  gap:10px;
  border-top:1px solid #eee;
  padding:10px 0;
}

.item img {
  width:60px;
  border-radius:10px;
}

/* TOTAL */
.total {
  text-align:right;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>My Orders</h2>
  <div id="orders">Loading...</div>
</div>

<script type="module">
import { supabase } from "./supabase.js"

function getStatusClass(status){
  if(status === "paid") return "paid"
  if(status === "shipped") return "shipped"
  return "pending"
}

async function loadOrders(){

  const { data: userData } = await supabase.auth.getUser()

  if (!userData.user) {
    document.getElementById("orders").innerText = "Login required"
    return
  }

  const user = userData.user

  const { data: orders } = await supabase
    .from("orders")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false })

  let html = ""

  for (let order of orders){

    html += `
      <div class="order">

        <div class="order-header">
          <div>
            <strong>Order #${order.id}</strong><br>
            <small>${new Date(order.created_at).toLocaleString()}</small>
          </div>

          <span class="status ${getStatusClass(order.status)}">
            ${order.status}
          </span>
        </div>
    `

    const { data: items } = await supabase
      .from("order_items")
      .select("*")
      .eq("order_id", order.id)

    for (let item of items){

      const { data: product } = await supabase
        .from("products")
        .select("*")
        .eq("id", item.product_id)
        .single()

      html += `
        <div class="item">
          <img src="${product.image || ''}">

          <div>
            <p><b>${product.name}</b></p>
            <p>$${item.price} x ${item.quantity}</p>
            <p>Size: ${item.size || "-"}</p>
          </div>
        </div>
      `
    }

    html += `
        <div class="total">
          Total: $${order.total}
        </div>
      </div>
    `
  }

  document.getElementById("orders").innerHTML =
    html || "No orders yet"
}

loadOrders()
</script>

</body>
</html>
