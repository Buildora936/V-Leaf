<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - V~Leaf</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* CONTAINER */
.container {
  max-width:500px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
}

/* AVATAR */
.avatar {
  text-align:center;
  margin-bottom:20px;
}

.avatar img {
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border:none;
  background:#39FF14;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

#msg {
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="avatar">
    <img id="avatar" src="https://via.placeholder.com/100">
    <input type="file" onchange="uploadAvatar(event)">
  </div>

  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone">
  <input id="country" placeholder="Country">
  <input id="address" placeholder="Address">

  <button onclick="saveProfile()">Save</button>

  <div id="msg"></div>

</div>

<script type="module">
import { supabase } from "./supabase.js"

let user = null

async function loadProfile(){

  const { data: userData } = await supabase.auth.getUser()

  if(!userData.user){
    window.location.href = "login.html"
    return
  }

  user = userData.user

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single()

  if(profile){
    document.getElementById("name").value = profile.full_name || ""
    document.getElementById("phone").value = profile.phone || ""
    document.getElementById("country").value = profile.country || ""
    document.getElementById("address").value = profile.address || ""

    if(profile.avatar_url){
      document.getElementById("avatar").src = profile.avatar_url
    }
  }
}

/* SAVE PROFILE */
window.saveProfile = async function(){

  const full_name = document.getElementById("name").value
  const phone = document.getElementById("phone").value
  const country = document.getElementById("country").value
  const address = document.getElementById("address").value

  await supabase.from("profiles").upsert({
    id: user.id,
    full_name,
    phone,
    country,
    address
  })

  document.getElementById("msg").innerText = "Saved!"
}

/* UPLOAD AVATAR */
window.uploadAvatar = async function(event){

  const file = event.target.files[0]

  if(!file) return

  const fileName = user.id + ".png"

  await supabase.storage
    .from("avatars")
    .upload(fileName, file, { upsert: true })

  const { data } = supabase
    .storage
    .from("avatars")
    .getPublicUrl(fileName)

  const url = data.publicUrl

  document.getElementById("avatar").src = url

  await supabase.from("profiles").upsert({
    id: user.id,
    avatar_url: url
  })
}

loadProfile()
</script>

</body>
</html>
