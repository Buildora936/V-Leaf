<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - V~Leaf</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

.container {
  max-width:500px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
}

/* AVATAR */
.avatar {
  text-align:center;
  margin-bottom:20px;
}

.avatar-circle{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:bold;
  margin:auto;
  overflow:hidden;
}

.avatar-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.avatar input{
  margin-top:10px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border:none;
  background:#39FF14;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

#msg {
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <div class="avatar">
    <div class="avatar-circle" id="avatarBox"></div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone">
  <input id="country" placeholder="Country">
  <input id="address" placeholder="Address">

  <button onclick="saveProfile()">Save Profile</button>

  <div id="msg"></div>

</div>

<script type="module">
import { supabase } from "./supabase.js"

let user = null
let currentAvatar = null

/* INIT */
async function init(){

  const { data } = await supabase.auth.getUser()

  if(!data.user){
    window.location.href = "login.html"
    return
  }

  user = data.user

  await loadProfile()
  document.getElementById("fileInput").addEventListener("change", uploadAvatar)
}

/* LOAD PROFILE */
async function loadProfile(){

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single()

  if(profile){

    document.getElementById("name").value = profile.full_name || ""
    document.getElementById("phone").value = profile.phone || ""
    document.getElementById("country").value = profile.country || ""
    document.getElementById("address").value = profile.address || ""

    currentAvatar = profile.avatar_url || null

    renderAvatar(profile)
  }
}

/* AVATAR DISPLAY */
function renderAvatar(profile){

  const box = document.getElementById("avatarBox")

  // SI IMAGE EXISTE
  if(profile.avatar_url){
    box.innerHTML = `<img src="${profile.avatar_url}">`
    return
  }

  // SINON → LETTRE
  let name = profile.full_name || user.email || "U"
  let firstLetter = name.trim().charAt(0).toUpperCase()

  box.innerHTML = `<span>${firstLetter}</span>`
}

/* SAVE PROFILE */
window.saveProfile = async function(){

  const payload = {
    id: user.id,
    full_name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    country: document.getElementById("country").value,
    address: document.getElementById("address").value,
    updated_at: new Date().toISOString()
  }

  const { error } = await supabase
    .from("profiles")
    .upsert(payload, { onConflict: "id" })

  if(error){
    document.getElementById("msg").innerText = "Error saving profile"
    return
  }

  document.getElementById("msg").innerText = "Profile saved ✓"

  // refresh avatar lettre si nom changé
  renderAvatar(payload)
}

/* UPLOAD AVATAR */
async function uploadAvatar(e){

  const file = e.target.files[0]
  if(!file) return

  const fileExt = file.name.split('.').pop()
  const filePath = `${user.id}.${fileExt}`

  const { error } = await supabase.storage
    .from("avatars")
    .upload(filePath, file, { upsert: true })

  if(error){
    document.getElementById("msg").innerText = "Upload failed"
    return
  }

  const { data } = supabase.storage
    .from("avatars")
    .getPublicUrl(filePath)

  const url = data.publicUrl

  document.getElementById("avatarBox").innerHTML = `<img src="${url}">`

  await supabase.from("profiles").upsert({
    id: user.id,
    avatar_url: url
  })

  document.getElementById("msg").innerText = "Avatar updated ✓"
}

init()
</script>

</body>
</html>
