<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - V~Leaf</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

.container {
  max-width:500px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
}

.avatar {
  text-align:center;
  margin-bottom:20px;
  position:relative;
}

.avatar img {
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #eee;
}

.avatar input{
  margin-top:10px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border:none;
  background:#39FF14;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

#msg {
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <div class="avatar">
    <img id="avatar" src="https://via.placeholder.com/100">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone">
  <input id="country" placeholder="Country">
  <input id="address" placeholder="Address">

  <button onclick="saveProfile()">Save Profile</button>

  <div id="msg"></div>

</div>

<script type="module">
import { supabase } from "./supabase.js"

let user = null

/* INIT */
async function init(){

  const { data } = await supabase.auth.getUser()

  if(!data.user){
    window.location.href = "login.html"
    return
  }

  user = data.user

  await loadProfile()
  document.getElementById("fileInput").addEventListener("change", uploadAvatar)
}

async function loadProfile(){

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single()

  if(profile){
    document.getElementById("name").value = profile.full_name || ""
    document.getElementById("phone").value = profile.phone || ""
    document.getElementById("country").value = profile.country || ""
    document.getElementById("address").value = profile.address || ""

    if(profile.avatar_url){
      document.getElementById("avatar").src = profile.avatar_url
    }
  }
}

/* SAVE PROFILE (SAFE UPSERT) */
window.saveProfile = async function(){

  const payload = {
    id: user.id,
    full_name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    country: document.getElementById("country").value,
    address: document.getElementById("address").value,
    updated_at: new Date().toISOString()
  }

  const { error } = await supabase
    .from("profiles")
    .upsert(payload, { onConflict: "id" })

  if(error){
    document.getElementById("msg").innerText = "Error saving profile"
    return
  }

  document.getElementById("msg").innerText = "Profile saved ✓"
}

/* AVATAR UPLOAD FIXED */
async function uploadAvatar(e){

  const file = e.target.files[0]
  if(!file) return

  const fileExt = file.name.split('.').pop()
  const filePath = `${user.id}.${fileExt}`

  const { error: uploadError } = await supabase.storage
    .from("avatars")
    .upload(filePath, file, {
      upsert: true
    })

  if(uploadError){
    document.getElementById("msg").innerText = "Upload failed"
    return
  }

  const { data } = supabase
    .storage
    .from("avatars")
    .getPublicUrl(filePath)

  const url = data.publicUrl

  document.getElementById("avatar").src = url

  await supabase.from("profiles").upsert({
    id: user.id,
    avatar_url: url
  })

  document.getElementById("msg").innerText = "Avatar updated ✓"
}

init()
</script>

</body>
</html>
