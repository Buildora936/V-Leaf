<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - V~Leaf</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* BOX */
.box {
  background: white;
  color: black;
  padding: 30px;
  border-radius: 20px;
  width: 340px;
  animation: fadeIn 0.8s ease;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #39FF14;
  border: none;
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
}

/* MSG */
#msg {
  margin-top: 10px;
  font-size: 14px;
}

/* LOGIN LINK */
.login {
  margin-top: 15px;
  font-size: 14px;
}

.login a {
  text-decoration: none;
  font-weight: bold;
  border-bottom: 2px solid #39FF14;
  color: black;
}
</style>
</head>

<body>

<div class="box">

  <h2>Create Account</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <input id="phone" placeholder="Phone (+509...)">
  <input id="country" placeholder="Country">
  <input id="address" placeholder="Full Address">

  <button onclick="register()">Register</button>

  <div id="msg"></div>

  <p class="login">
    Déjà un compte ? <a href="login.html">Login</a>
  </p>

</div>

<script type="module">
import { supabase } from "./supabase.js"

window.register = async function () {

  const name = document.getElementById("name").value
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value
  const phone = document.getElementById("phone").value
  const country = document.getElementById("country").value
  const address = document.getElementById("address").value

  const msg = document.getElementById("msg")

  msg.innerText = "Creating account..."

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  })

  if (error) {
    msg.innerText = error.message
    return
  }

  // IMPORTANT : user peut être null si email confirmation activé
  const user = data.user

  if (user) {
    await supabase.from("profiles").insert({
      id: user.id,
      full_name: name,
      phone,
      country,
      address
    })
  }

  msg.style.color = "green"
  msg.innerText = "Compte créé ! Vérifie ton email pour activer ton compte."
}
</script>

</body>
</html>
