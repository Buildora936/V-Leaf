
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - V~Leaf</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  padding-bottom:80px;
}

/* NAVBAR */
nav {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  z-index: 100;
}

nav img { height: 35px; }

/* HEADER */
.header { padding: 40px 10%; }
.header h1 { font-size: 36px; }

/* FILTER BAR */
.filters {
  display: flex;
  gap: 10px;
  padding: 0 10%;
  margin-bottom: 20px;
  overflow-x:auto;
}

.filters button {
  padding: 10px 15px;
  border: 1px solid #ddd;
  background: white;
  border-radius: 20px;
  cursor: pointer;
}

.filters button.active {
  background: black;
  color: white;
}

/* ADV FILTER */
.advanced {
  padding: 0 10%;
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.advanced input, .advanced select{
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 0 10%;
}

/* CARD */
.card {
  border-radius: 20px;
  overflow: hidden;
  transition: 0.4s;
  cursor: pointer;
  position:relative;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
}

/* IMAGE */
.card img {
  width: 100%;
  background: #f5f5f5;
  transition:0.4s;
}

.card:hover img{
  transform:scale(1.05);
}

/* CONTENT */
.card-content { padding: 15px; }

.card h3 {
  margin: 0;
  font-size: 16px;
}

/* PRICE */
.price { font-weight: bold; }

.old-price {
  text-decoration: line-through;
  color: #888;
  font-size: 13px;
  margin-left: 5px;
}

/* BADGE DYNAMIC */
.badge {
  position: absolute;
  background: #39FF14;
  padding: 5px 8px;
  font-size: 12px;
  font-weight: bold;
  border-radius: 5px;
  top: 10px;
  left: 10px;
}

/* QUICK ADD */
.quick-add{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#39FF14;
  border:none;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
  opacity:0;
  transition:0.3s;
}

.card:hover .quick-add{
  opacity:1;
}

/* MOBILE TAP */
.card:active{
  transform:scale(0.97);
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:white;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom-nav a{
  text-decoration:none;
  font-size:12px;
  color:#444;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom-nav i{ font-size:20px; }

.nav-avatar{
  width:24px;
  height:24px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <img src="V-Leaf logo.png">
</nav>

<!-- HEADER -->
<div class="header">
  <h1>Shop</h1>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="active" onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('cheap')">Under $50</button>
  <button onclick="filterProducts('premium')">Premium</button>
</div>

<!-- ADV FILTER -->
<div class="advanced">
  <select id="sort">
    <option value="">Sort</option>
    <option value="low">Price low</option>
    <option value="high">Price high</option>
  </select>

  <input type="number" id="minPrice" placeholder="Min">
  <input type="number" id="maxPrice" placeholder="Max">
</div>

<!-- PRODUCTS -->
<div class="products" id="products">Loading...</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="shop.html">
    <i class="fa-solid fa-grid-2"></i>
    <span>Shop</span>
  </a>

  <a href="cart.html">
    <i class="fa-solid fa-cart-shopping"></i>
    <span>Cart</span>
  </a>

  <a href="profile.html">
    <img src="https://via.placeholder.com/40" class="nav-avatar" id="avatar">
    <span>Profile</span>
  </a>

</div>

<script type="module">
import { supabase } from "./supabase.js"

let allProducts = []

async function loadProducts() {
  const { data } = await supabase.from("products").select("*")
  allProducts = data || []
  displayProducts(allProducts)
}

function getBadge(p){
  if(p.price < 40) return "SALE"
  if(p.price > 80) return "PREMIUM"
  return "HOT"
}

function displayProducts(products) {
  let html = ""

  products.forEach(p => {
    html += `
      <div class="card-wrapper">

        <div class="badge">${getBadge(p)}</div>

        <div class="card" onclick="viewProduct('${p.id}')">
          <img src="${p.image || ''}">
          <div class="card-content">
            <h3>${p.name}</h3>
            <div>
              <span class="price">$${p.price}</span>
              <span class="old-price">$${Math.round(p.price * 1.3)}</span>
            </div>
          </div>

          <button class="quick-add" onclick="quickAdd(event,'${p.id}')">
            <i class="fa-solid fa-plus"></i>
          </button>

        </div>
      </div>
    `
  })

  document.getElementById("products").innerHTML = html
}

/* QUICK ADD */
window.quickAdd = async function(e,id){
  e.stopPropagation()

  const { data } = await supabase.auth.getUser()
  if(!data.user){
    window.location.href="login.html"
    return
  }

  await supabase.from("cart").insert({
    user_id: data.user.id,
    product_id: id,
    quantity:1
  })

  alert("Added")
}

/* FILTER */
window.filterProducts = function(type){
  if(type==="cheap") displayProducts(allProducts.filter(p=>p.price<50))
  else if(type==="premium") displayProducts(allProducts.filter(p=>p.price>=50))
  else displayProducts(allProducts)
}

/* ADV FILTER */
document.getElementById("sort").onchange = applyAdvanced
document.getElementById("minPrice").oninput = applyAdvanced
document.getElementById("maxPrice").oninput = applyAdvanced

function applyAdvanced(){
  let list = [...allProducts]

  const min = parseFloat(minPrice.value)||0
  const max = parseFloat(maxPrice.value)||Infinity

  list = list.filter(p=>p.price>=min && p.price<=max)

  if(sort.value==="low") list.sort((a,b)=>a.price-b.price)
  if(sort.value==="high") list.sort((a,b)=>b.price-a.price)

  displayProducts(list)
}

/* PROFILE */
async function loadAvatar(){
  const { data } = await supabase.auth.getUser()
  if(!data.user) return

  const { data: profile } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", data.user.id)
    .single()

  if(profile?.avatar_url){
    document.getElementById("avatar").src = profile.avatar_url
  }
}

window.viewProduct = id=>{
  window.location.href="product.html?id="+id
}

loadProducts()
loadAvatar()
</script>

</body>
</html>
