<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - V~Leaf</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* === TON CSS EXISTANT (inchangé) === */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  padding-bottom:80px;
}

/* ... (tout ton CSS précédent reste exactement pareil) ... */


/* === AJOUTS === */

/* HOVER PREMIUM */
.card{
  transition:0.25s;
}

.card:active{
  transform:scale(0.97);
}

/* IMAGE ZOOM */
.card img{
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.05);
}

/* QUICK ADD BUTTON */
.quick-add{
  position:absolute;
  bottom:10px;
  right:10px;
  background:black;
  color:white;
  border:none;
  padding:8px 10px;
  border-radius:50%;
  font-size:14px;
  cursor:pointer;
}

/* DISCOUNT BADGE */
.discount{
  position:absolute;
  top:8px;
  right:8px;
  background:red;
  color:white;
  font-size:11px;
  padding:4px 6px;
  border-radius:5px;
}

/* SKELETON LOADING */
.skeleton{
  height:220px;
  border-radius:15px;
  background:linear-gradient(90deg,#eee,#f5f5f5,#eee);
  animation:loading 1.2s infinite;
}

@keyframes loading{
  0%{background-position:-200px}
  100%{background-position:200px}
}
</style>
</head>

<body>

<!-- TOPBAR (inchangé) -->
<div class="topbar">
  <img src="V-Leaf logo.png" class="logo">

  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- FILTERS (inchangé) -->
<div class="filters">
  <button class="active" onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('cheap')">Under $50</button>
  <button onclick="filterProducts('premium')">Premium</button>
</div>

<!-- ADVANCED (inchangé) -->
<div class="advanced">
  <select id="sort">
    <option value="">Sort</option>
    <option value="low">Price low</option>
    <option value="high">Price high</option>
  </select>

  <input type="number" id="minPrice" placeholder="Min">
  <input type="number" id="maxPrice" placeholder="Max">
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

  <!-- SKELETON -->
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>

</div>

<!-- BOTTOM NAV (inchangé) -->
<div class="bottom-nav">

  <a href="index.html">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="shop.html">
    <i class="fa-solid fa-grid-2"></i>
    <span>Shop</span>
  </a>

  <a href="cart.html">
    <i class="fa-solid fa-cart-shopping"></i>
    <span>Cart</span>
  </a>

  <a href="profile.html">
    <img src="https://via.placeholder.com/40" class="nav-avatar" id="avatar">
    <span>Profile</span>
  </a>

</div>

<script type="module">
import { supabase } from "./supabase.js"

let allProducts = []

async function loadProducts(){

  const { data } = await supabase.from("products").select("*")
  allProducts = data || []
  displayProducts(allProducts)
}

function displayProducts(list){

  let html = ""

  list.forEach(p=>{

    const discount = Math.round(100 - (p.price / (p.price*1.3))*100)

    html += `
      <div class="card-wrapper">

        <div class="badge">HOT</div>
        <div class="discount">-${discount}%</div>

        <div class="card" onclick="viewProduct('${p.id}')">

          <img src="${p.image || ''}">

          <div class="card-content">
            <h3>${p.name}</h3>

            <div>
              <span class="price">$${p.price}</span>
              <span class="old-price">$${Math.round(p.price*1.3)}</span>
            </div>
          </div>
        </div>

        <button class="quick-add"
          onclick="event.stopPropagation(); quickAdd('${p.id}')">
          <i class="fa-solid fa-plus"></i>
        </button>

      </div>
    `
  })

  document.getElementById("products").innerHTML = html
}

/* QUICK ADD */
window.quickAdd = async function(product_id){

  const { data } = await supabase.auth.getUser()

  if(!data.user){
    window.location.href="login.html"
    return
  }

  await supabase.from("cart").insert({
    user_id:data.user.id,
    product_id:product_id,
    quantity:1
  })

  alert("Added")
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase()
  displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(val)))
})

/* FILTER */
window.filterProducts = function(type){
  if(type==="cheap") displayProducts(allProducts.filter(p=>p.price<50))
  else if(type==="premium") displayProducts(allProducts.filter(p=>p.price>=50))
  else displayProducts(allProducts)
}

/* ADV */
sort.onchange = applyAdvanced
minPrice.oninput = applyAdvanced
maxPrice.oninput = applyAdvanced

function applyAdvanced(){
  let list=[...allProducts]

  const min=parseFloat(minPrice.value)||0
  const max=parseFloat(maxPrice.value)||Infinity

  list=list.filter(p=>p.price>=min && p.price<=max)

  if(sort.value==="low") list.sort((a,b)=>a.price-b.price)
  if(sort.value==="high") list.sort((a,b)=>b.price-a.price)

  displayProducts(list)
}

/* PROFILE */
async function loadAvatar(){
  const { data } = await supabase.auth.getUser()
  if(!data.user) return

  const { data: profile } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", data.user.id)
    .single()

  if(profile?.avatar_url){
    document.getElementById("avatar").src = profile.avatar_url
  }
}

/* VIEW */
window.viewProduct=id=>{
  window.location.href="product.html?id="+id
}

loadProducts()
loadAvatar()
</script>

</body>
</html>
