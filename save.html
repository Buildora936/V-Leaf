<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - V~Leaf</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: #000;
  padding-bottom:80px;
}

/* NAVBAR */
nav {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  z-index: 100;
}

nav img {
  height: 35px;
}

/* TOP SEARCH (AJOUT) */
.top-search{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 30px;
}

.top-search input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #eee;
}

/* HEADER */
.header {
  padding: 40px 10%;
}

/* FILTER BAR */
.filters {
  display: flex;
  gap: 10px;
  padding: 0 10%;
  margin-bottom: 20px;
  overflow-x:auto;
}

.filters button {
  padding: 10px 15px;
  border: 1px solid #ddd;
  background: white;
  border-radius: 20px;
  cursor: pointer;
}

.filters button.active {
  background: black;
  color: white;
}

/* ADV FILTER */
.advanced{
  padding:0 10%;
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.advanced input, .advanced select{
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 0 10%;
}

/* CARD */
.card {
  border-radius: 20px;
  overflow: hidden;
  transition: 0.4s;
  cursor: pointer;
  position:relative;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
}

/* IMAGE */
.card img {
  width: 100%;
  background: #f5f5f5;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.05);
}

/* QUICK ADD (AJOUT) */
.quick-add{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#39FF14;
  border:none;
  padding:8px 10px;
  border-radius:50%;
  display:none;
  cursor:pointer;
}

.card:hover .quick-add{
  display:block;
}

/* CONTENT */
.card-content {
  padding: 15px;
}

.card h3 {
  margin: 0;
  font-size: 16px;
}

/* PRICE */
.price {
  margin-top: 5px;
  font-weight: bold;
}

.old-price {
  text-decoration: line-through;
  color: #888;
  font-size: 13px;
  margin-left: 5px;
}

/* BADGE */
.badge {
  position: absolute;
  background: #39FF14;
  padding: 5px 8px;
  font-size: 12px;
  font-weight: bold;
  border-radius: 5px;
  top: 10px;
  left: 10px;
}

/* WRAP */
.card-wrapper {
  position: relative;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:white;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom-nav a{
  text-decoration:none;
  font-size:12px;
  color:#444;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.nav-avatar{
  width:24px;
  height:24px;
  border-radius:50%;
}
</style>
</head>

<div class="header">

</div>

<!-- ADVANCED -->
<div class="advanced">
  <select id="sort">

    <option value="low">Price low</option>
    <option value="high">Price high</option>
  </select>

  <input type="number" id="minPrice" placeholder="Min">
  <input type="number" id="maxPrice" placeholder="Max">
</div>

<!-- PRODUCTS -->
<div class="products" id="products">
  Loading...
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
  <a href="shop.html"><i class="fa-solid fa-grid-2"></i><span>Shop</span></a>
  <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span></a>
  <a href="profile.html">
    <img src="https://via.placeholder.com/40" id="avatar" class="nav-avatar">
    <span>Profile</span>
  </a>
</div>
