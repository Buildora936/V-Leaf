<!DOCTYPE html>
<html>
<head>
  <title>Shipping V~Leaf</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color:white;
      padding:20px;
      padding-bottom:80px;
    }

    h1 {
      text-align:center;
      margin-bottom:20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius:15px;
      padding:20px;
      margin-bottom:15px;
      backdrop-filter: blur(10px);
    }

    .card i {
      color:#39FF14;
      margin-right:10px;
    }

    /* NAV */
    .nav {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:#111;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
    }

    .nav a {
      color:white;
      text-decoration:none;
      font-size:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .nav i {
      color:#39FF14;
      font-size:18px;
    }
  </style>
</head>

<body>

<h1>Livraison</h1>

<div class="card">
  <p><i class="fa fa-truck"></i> Livraison standard : 5 à 10 jours</p>
</div>

<div class="card">
  <p><i class="fa fa-globe"></i> Livraison internationale disponible</p>
</div>

<div class="card">
  <p><i class="fa fa-clock"></i> Traitement commande : 24 à 48h</p>
</div>

<div class="card">
  <p><i class="fa fa-box"></i> Suivi disponible après expédition</p>
</div>

<!-- NAV -->
<div class="nav">
  <a href="shop.html"><i class="fa fa-store"></i>Shop</a>
  <a href="cart.html"><i class="fa fa-cart-shopping"></i>Cart</a>
  <a href="orders.html"><i class="fa fa-box"></i>Orders</a>
  <a href="profile.html"><i class="fa fa-user"></i>Profile</a>
</div>

</body>
</html>
