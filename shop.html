<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - V~Leaf</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: #000;
}

/* NAVBAR */
/* TOPBAR TEMU STYLE */
.topbar{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:1px solid #eee;
  z-index:100;
}

.logo{
  width:40px;
}

.search{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:#f5f5f5;
  padding:8px 12px;
  border-radius:25px;
}

.search input{
  border:none;
  outline:none;
  background:transparent;
  width:100%;
}

/* PROFILE IMAGE */
.profile-pic{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
}

/* ICON */
.icon{
  font-size:20px;
  color:black;
}

/* FILTER SCROLL (TEMU STYLE) */
.filters{
  overflow-x:auto;
  padding-bottom:10px;
}

.filters::-webkit-scrollbar{
  display:none;
}

/* HEADER */
.header {
  padding: 40px 10%;
}

.header h1 {
  font-size: 36px;
}

/* FILTER BAR */
.filters {
  display: flex;
  gap: 10px;
  padding: 0 10%;
  margin-bottom: 20px;
}

.filters button {
  padding: 10px 15px;
  border: 1px solid #ddd;
  background: white;
  border-radius: 20px;
  cursor: pointer;
}

.filters button.active {
  background: black;
  color: white;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 0 10%;
}

/* CARD */
.card {
  border-radius: 20px;
  overflow: hidden;
  transition: 0.4s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px);
}

/* IMAGE */
.card img {
  width: 100%;
  background: #f5f5f5;
}

/* CONTENT */
.card-content {
  padding: 15px;
}

.card h3 {
  margin: 0;
  font-size: 16px;
}

/* PRICE */
.price {
  margin-top: 5px;
  font-weight: bold;
}

.old-price {
  text-decoration: line-through;
  color: #888;
  font-size: 13px;
  margin-left: 5px;
}

/* BADGE */
.badge {
  position: absolute;
  background: #39FF14;
  padding: 5px 8px;
  font-size: 12px;
  font-weight: bold;
  border-radius: 5px;
  top: 10px;
  left: 10px;
}

/* WRAP */
.card-wrapper {
  position: relative;
}

/* FOOTER */
footer {
  margin-top: 60px;
  padding: 30px;
  text-align: center;
  border-top: 1px solid #eee;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="topbar">

  <img src="V-Leaf logo.png" class="logo">

  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchInput" type="text" placeholder="Search products...">
  </div>

  <div id="nav-right"></div>

</nav>
<!-- HEADER -->
<div class="header">
  <h1>Shop</h1>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="active" onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('cheap')">Under $50</button>
  <button onclick="filterProducts('premium')">Premium</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">
  Loading...
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 V~Leaf</p>
</footer>

<script type="module">
import { supabase } from "./supabase.js"

let allProducts = []
/* SEARCH */
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("searchInput")

  input.addEventListener("input", () => {
    const value = input.value.toLowerCase()

    const filtered = allProducts.filter(p =>
      p.name.toLowerCase().includes(value)
    )

    displayProducts(filtered)
  })
})

  async function loadProducts() {
  const { data } = await supabase
    .from("products")
    .select("*")

  allProducts = data || []
  displayProducts(allProducts)
}

function displayProducts(products) {
  let html = ""

  products.forEach(p => {
    html += `
      <div class="card-wrapper">
        <div class="badge">NEW</div>

        <div class="card" onclick="viewProduct('${p.id}')">
          <img src="${p.image || ''}">
          <div class="card-content">
            <h3>${p.name}</h3>
            <div>
              <span class="price">$${p.price}</span>
              <span class="old-price">$${Math.round(p.price * 1.3)}</span>
            </div>
          </div>
        </div>
      </div>
    `
  })

  document.getElementById("products").innerHTML = html
}

/* FILTER */
window.filterProducts = function(type) {

  document.querySelectorAll(".filters button")
    .forEach(btn => btn.classList.remove("active"))

  event.target.classList.add("active")

  if(type === "cheap"){
    displayProducts(allProducts.filter(p => p.price < 50))
  }
  else if(type === "premium"){
    displayProducts(allProducts.filter(p => p.price >= 50))
  }
  else{
    displayProducts(allProducts)
  }
}

/* VIEW */
window.viewProduct = function(id){
  window.location.href = "product.html?id=" + id
}
async function loadNav(){

  const { data } = await supabase.auth.getUser()
  const nav = document.getElementById("nav-right")

  if(data.user){

    // récupérer profil
    const { data: profile } = await supabase
      .from("profiles")
      .select("avatar_url")
      .eq("id", data.user.id)
      .single()

    nav.innerHTML = `
      <a href="cart.html">
        <i class="fa-solid fa-bag-shopping icon"></i>
      </a>

      <a href="profile.html">
        <img src="${profile?.avatar_url || 'https://via.placeholder.com/40'}"
             class="profile-pic">
      </a>
    `

  } else {

    nav.innerHTML = `
      <a href="register.html" style="
        background:#39FF14;
        padding:8px 15px;
        border-radius:20px;
        text-decoration:none;
        color:black;
        font-weight:bold;">
        Sign Up
      </a>
    `
  }
}
loadProducts()
  loadNav()
</script>

</body>
</html>
