<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - V~Leaf</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  padding-bottom:80px;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:1px solid #eee;
  z-index:100;
}

.logo{ width:40px; }

.search{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:#f5f5f5;
  padding:8px 12px;
  border-radius:25px;
}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap:15px;
  padding:10px;
}

/* CARD */
.card-wrapper{ position:relative; }

.card{
  border-radius:15px;
  overflow:hidden;
  background:white;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{ width:100%; }

.card-content{ padding:10px; }

.price{ font-weight:bold; }

/* BADGES */
.badge{
  position:absolute;
  top:8px;
  left:8px;
  font-size:11px;
  padding:4px 6px;
  border-radius:5px;
  color:white;
}

.badge.new{ background:black; }
.badge.sale{ background:#39FF14; color:black; }

/* QUICK ADD */
.quick{
  position:absolute;
  bottom:10px;
  right:10px;
  background:black;
  color:white;
  padding:8px;
  border-radius:50%;
  cursor:pointer;
}

/* SKELETON */
.skeleton{
  height:250px;
  background:linear-gradient(90deg,#eee,#f5f5f5,#eee);
  animation:loading 1.2s infinite;
  border-radius:15px;
}

@keyframes loading{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:white;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom-nav a{
  text-decoration:none;
  font-size:12px;
  color:#444;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.nav-avatar{
  width:24px;
  height:24px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="topbar">
  <img src="V-Leaf logo.png" class="logo">
  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<div class="filters">
  <button onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('cheap')">Under $50</button>
  <button onclick="filterProducts('premium')">Premium</button>
</div>

<div class="products" id="products">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<div class="bottom-nav">
  <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
  <a href="shop.html"><i class="fa-solid fa-grid-2"></i><span>Shop</span></a>
  <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span></a>
  <a href="profile.html">
    <img src="https://via.placeholder.com/40" id="avatar" class="nav-avatar">
    <span>Profile</span>
  </a>
</div>

<script type="module">
import { supabase } from "./supabase.js"

let allProducts = []

async function loadProducts(){
  const { data } = await supabase.from("products").select("*")
  allProducts = data || []
  displayProducts(allProducts)
}

function getBadge(p){
  if(p.price < 50) return '<div class="badge sale">SALE</div>'
  return '<div class="badge new">NEW</div>'
}

function displayProducts(list){
  let html = ""

  list.forEach(p=>{
    html += `
      <div class="card-wrapper">
        ${getBadge(p)}

        <div class="card" onclick="viewProduct('${p.id}')">
          <img src="${p.image || ''}">
          <div class="card-content">
            <h3>${p.name}</h3>
            <span class="price">$${p.price}</span>
          </div>
        </div>

        <div class="quick" onclick="quickAdd(event,'${p.id}')">
          <i class="fa-solid fa-plus"></i>
        </div>
      </div>
    `
  })

  document.getElementById("products").innerHTML = html
}

/* SEARCH */
searchInput.oninput = e=>{
  const val = e.target.value.toLowerCase()
  displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(val)))
}

/* FILTER */
window.filterProducts = type=>{
  if(type==="cheap") displayProducts(allProducts.filter(p=>p.price<50))
  else if(type==="premium") displayProducts(allProducts.filter(p=>p.price>=50))
  else displayProducts(allProducts)
}

/* QUICK ADD */
window.quickAdd = async function(e,id){
  e.stopPropagation()

  const { data } = await supabase.auth.getUser()
  if(!data.user){
    alert("Login required")
    return
  }

  await supabase.from("cart").insert({
    user_id:data.user.id,
    product_id:id,
    quantity:1
  })

  alert("Added")
}

/* PROFILE */
async function loadAvatar(){
  const { data } = await supabase.auth.getUser()
  if(!data.user) return

  const { data: profile } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", data.user.id)
    .single()

  if(profile?.avatar_url){
    avatar.src = profile.avatar_url
  }
}

window.viewProduct = id=>{
  window.location.href="product.html?id="+id
}

loadProducts()
loadAvatar()
</script>

</body>
</html>
