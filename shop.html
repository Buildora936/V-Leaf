<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - V~Leaf</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  padding-bottom:80px;
}

/* TOPBAR (UNCHANGED STYLE + SAFE IMPROVE) */
.topbar{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:1px solid #eee;
  z-index:100;
}

.logo{ width:40px; }

.search{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:#f5f5f5;
  padding:8px 12px;
  border-radius:25px;
}

.search input{
  border:none;
  outline:none;
  background:transparent;
  width:100%;
}
/* SKELETON */
.skeleton{
  background: linear-gradient(90deg, #eee, #f5f5f5, #eee);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius:10px;
}

@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

.skel-img{
  width:100%;
  height:160px;
}

.skel-text{
  height:12px;
  margin-top:8px;
}

.skel-small{
  width:60%;
}
/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.filters button{
  padding:8px 15px;
  border-radius:20px;
  border:1px solid #ddd;
  background:white;
  transition:0.2s;
}

.filters button.active{
  background:black;
  color:white;
}

/* ADVANCED */
.advanced{
  padding:10px;
  display:flex;
  gap:10px;
}

.advanced select, .advanced input{
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap:15px;
  padding:10px;
}

/* CARD WRAPPER */
.card-wrapper{
  position:relative;
}

/* CARD (UPGRADED INTERACTIONS ONLY) */
.card{
  border-radius:15px;
  overflow:hidden;
  background:white;
  transition:0.25s ease;
  cursor:pointer;
  position:relative;
}

.card:hover{
  transform:translateY(-6px);
}

.card:active{
  transform:scale(0.97);
}

.card img{
  width:100%;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.05);
}

/* CONTENT */
.card-content{
  padding:10px;
}

.price{ font-weight:bold; }

.old-price{
  text-decoration:line-through;
  color:#888;
  font-size:12px;
}

/* BADGE (dynamic feel) */
.badge{
  position:absolute;
  top:8px;
  left:8px;
  background:#39FF14;
  font-size:11px;
  padding:4px 6px;
  border-radius:5px;
  font-weight:bold;
}

/* QUICK ADD BUTTON */
.quick-add{
  position:absolute;
  bottom:10px;
  right:10px;
  background:black;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  opacity:0;
  transform:translateY(10px);
  transition:0.2s;
}

.card-wrapper:hover .quick-add{
  opacity:1;
  transform:translateY(0);
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:white;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom-nav a{
  text-decoration:none;
  font-size:12px;
  color:#444;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom-nav i{ font-size:20px; }

.nav-avatar{
  width:24px;
  height:24px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <img src="V-Leaf logo.png" class="logo">

  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="active" onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('cheap')">Under $50</button>
  <button onclick="filterProducts('premium')">Premium</button>
</div>

<!-- ADVANCED -->
<div class="advanced">
  <select id="sort">
    <option value="">Sort</option>
    <option value="low">Price low</option>
    <option value="high">Price high</option>
  </select>

  <input type="number" id="minPrice" placeholder="Min">
  <input type="number" id="maxPrice" placeholder="Max">
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

  <!-- Skeleton x6 -->
  
    <div class="card-wrapper">
      <div class="card">
        <div class="skeleton skel-img"></div>
        <div class="card-content">
          <div class="skeleton skel-text"></div>
          <div class="skeleton skel-text skel-small"></div>
        </div>
      </div>
    </div>
  <div class="card-wrapper">
      <div class="card">
        <div class="skeleton skel-img"></div>
        <div class="card-content">
          <div class="skeleton skel-text"></div>
          <div class="skeleton skel-text skel-small"></div>
        </div>
      </div>
    </div>
  <div class="card-wrapper">
      <div class="card">
        <div class="skeleton skel-img"></div>
        <div class="card-content">
          <div class="skeleton skel-text"></div>
          <div class="skeleton skel-text skel-small"></div>
        </div>
      </div>
    </div>
  <div class="card-wrapper">
      <div class="card">
        <div class="skeleton skel-img"></div>
        <div class="card-content">
          <div class="skeleton skel-text"></div>
          <div class="skeleton skel-text skel-small"></div>
        </div>
      </div>
    </div>
  <div class="card-wrapper">
      <div class="card">
        <div class="skeleton skel-img"></div>
        <div class="card-content">
          <div class="skeleton skel-text"></div>
          <div class="skeleton skel-text skel-small"></div>
        </div>
      </div>
    </div>
  <div class="card-wrapper">
      <div class="card">
        <div class="skeleton skel-img"></div>
        <div class="card-content">
          <div class="skeleton skel-text"></div>
          <div class="skeleton skel-text skel-small"></div>
        </div>
      </div>
    </div>
  

</div>
<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="shop.html">
    <i class="fa-solid fa-shop"></i>
    <span>Shop</span>
  </a>

  <a href="cart.html">
    <i class="fa-solid fa-cart-shopping"></i>
    <span>Cart</span>
  </a>

  <a href="profile.html">
    <img src="https://via.placeholder.com/40" class="nav-avatar" id="avatar">
    <span>You</span>
  </a>

</div>

<script type="module">
import { supabase } from "./supabase.js"

let allProducts = []

async function loadProducts()

{
  const { data } = await supabase.from("products").select("*")
  allProducts = data || []
  displayProducts(allProducts)
}

/* DISPLAY */
function displayProducts(list){
  let html = ""

  list.forEach(p=>{

    const discount = Math.round((1 - p.price/(p.price*1.3)) * 100)

    html += `
      <div class="card-wrapper">

        <div class="badge">-${discount}%</div>

        <div class="card" onclick="viewProduct('${p.id}')">

          <img src="${p.image || ''}">

          <div class="card-content">
            <h3>${p.name}</h3>

            <div>
              <span class="price">$${p.price}</span>
              <span class="old-price">$${Math.round(p.price*1.3)}</span>
            </div>
          </div>

          <button class="quick-add" onclick="quickAdd(event,'${p.id}')">
            Quick Add
          </button>

        </div>
      </div>
    `
  })

  document.getElementById("products").innerHTML = html
}

/* QUICK ADD (placeholder future cart) */
window.quickAdd = function(e,id){
  e.stopPropagation()
  alert("Added to cart product id: " + id)
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase()
  displayProducts(allProducts.filter(p=>p.name.toLowerCase().includes(val)))
})

/* FILTER */
window.filterProducts = function(type){
  if(type==="cheap") displayProducts(allProducts.filter(p=>p.price<50))
  else if(type==="premium") displayProducts(allProducts.filter(p=>p.price>=50))
  else displayProducts(allProducts)
}

/* ADV FILTER */
document.getElementById("sort").onchange = applyAdvanced
document.getElementById("minPrice").oninput = applyAdvanced
document.getElementById("maxPrice").oninput = applyAdvanced

function applyAdvanced(){

  let list = [...allProducts]

  const min = parseFloat(minPrice.value) || 0
  const max = parseFloat(maxPrice.value) || Infinity

  list = list.filter(p => p.price >= min && p.price <= max)

  if(sort.value==="low") list.sort((a,b)=>a.price-b.price)
  if(sort.value==="high") list.sort((a,b)=>b.price-a.price)

  displayProducts(list)
}

/* VIEW */
window.viewProduct = id=>{
  window.location.href="product.html?id="+id
}

/* PROFILE */
async function loadAvatar(){
  const { data } = await supabase.auth.getUser()
  if(!data.user) return

  const { data: profile } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", data.user.id)
    .single()

  if(profile?.avatar_url){
    document.getElementById("avatar").src = profile.avatar_url
  }
}

loadProducts()
loadAvatar()
</script>

</body>
</html>
