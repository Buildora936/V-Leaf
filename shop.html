<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - V~Leaf</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#fff;
  padding-bottom:80px;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:1px solid #eee;
  z-index:100;
}

.logo{ width:40px; }

.search{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:#f5f5f5;
  padding:10px;
  border-radius:25px;
}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.filters button{
  padding:8px 15px;
  border-radius:20px;
  border:1px solid #ddd;
  background:white;
}

.filters button.active{
  background:black;
  color:white;
}

/* ADV FILTER */
.advanced{
  display:flex;
  gap:10px;
  padding:10px;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:15px;
  padding:10px;
}

/* CARD */
.card-wrapper{ position:relative; }

.card{
  border-radius:18px;
  overflow:hidden;
  background:white;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card:active{
  transform:scale(0.97);
}

/* IMAGE */
.card img{
  width:100%;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.05);
}

/* CONTENT */
.card-content{
  padding:10px;
}

.price{ font-weight:bold; }

.old-price{
  text-decoration:line-through;
  font-size:12px;
  color:#888;
}

/* BADGE */
.badge{
  position:absolute;
  top:8px;
  left:8px;
  background:#39FF14;
  padding:4px 6px;
  font-size:11px;
  border-radius:5px;
}

/* QUICK ADD */
.quick{
  position:absolute;
  bottom:10px;
  right:10px;
  background:black;
  color:white;
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SKELETON */
.skeleton{
  height:200px;
  background:linear-gradient(90deg,#eee,#f5f5f5,#eee);
  animation:load 1.2s infinite;
  border-radius:15px;
}

@keyframes load{
  0%{background-position:-200px;}
  100%{background-position:200px;}
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:white;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom-nav a{
  text-decoration:none;
  font-size:12px;
  color:#444;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.nav-avatar{
  width:24px;
  height:24px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <img src="V-Leaf logo.png" class="logo">

  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="active" onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('cheap')">Under $50</button>
  <button onclick="filterProducts('premium')">Premium</button>
</div>

<!-- ADV -->
<div class="advanced">
  <select id="sort">
    <option value="">Sort</option>
    <option value="low">Price low</option>
    <option value="high">Price high</option>
  </select>

  <input type="number" id="minPrice" placeholder="Min">
  <input type="number" id="maxPrice" placeholder="Max">
</div>

<!-- PRODUCTS -->
<div class="products" id="products">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="shop.html">
    <i class="fa-solid fa-shop"></i>
    <span>Shop</span>
  </a>

  <a href="cart.html">
    <i class="fa-solid fa-cart-shopping"></i>
    <span>Cart</span>
  </a>

  <a href="profile.html">
    <img id="avatar" class="nav-avatar" src="https://via.placeholder.com/40">
    <span>Profile</span>
  </a>

</div>

<script type="module">
import { supabase } from "./supabase.js"

let allProducts = []

async function loadProducts(){
  const { data } = await supabase.from("products").select("*")
  allProducts = data || []
  displayProducts(allProducts)
}

function displayProducts(list){

  let html = ""

  list.forEach(p=>{
    html += `
      <div class="card-wrapper">

        <div class="badge">HOT</div>

        <div class="card" onclick="viewProduct('${p.id}')">
          <img src="${p.image || ''}">

          <div class="card-content">
            <h3>${p.name}</h3>
            <div>
              <span class="price">$${p.price}</span>
              <span class="old-price">$${Math.round(p.price*1.3)}</span>
            </div>
          </div>
        </div>

        <div class="quick" onclick="quickAdd('${p.id}', event)">
          <i class="fa-solid fa-plus"></i>
        </div>

      </div>
    `
  })

  document.getElementById("products").innerHTML = html
}

/* SEARCH */
searchInput.oninput = e=>{
  const v = e.target.value.toLowerCase()
  displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(v)))
}

/* FILTER */
window.filterProducts = type=>{
  if(type==="cheap") displayProducts(allProducts.filter(p=>p.price<50))
  else if(type==="premium") displayProducts(allProducts.filter(p=>p.price>=50))
  else displayProducts(allProducts)
}

/* ADV */
sort.onchange = applyAdvanced
minPrice.oninput = applyAdvanced
maxPrice.oninput = applyAdvanced

function applyAdvanced(){

  let list=[...allProducts]

  const min=parseFloat(minPrice.value)||0
  const max=parseFloat(maxPrice.value)||99999

  list=list.filter(p=>p.price>=min && p.price<=max)

  if(sort.value==="low") list.sort((a,b)=>a.price-b.price)
  if(sort.value==="high") list.sort((a,b)=>b.price-a.price)

  displayProducts(list)
}

/* QUICK ADD */
window.quickAdd = async function(id,e){
  e.stopPropagation()

  const { data } = await supabase.auth.getUser()
  if(!data.user){
    window.location.href="login.html"
    return
  }

  await supabase.from("cart").insert({
    user_id:data.user.id,
    product_id:id,
    quantity:1
  })

  alert("Added")
}

/* AVATAR */
async function loadAvatar(){
  const { data } = await supabase.auth.getUser()
  if(!data.user) return

  const { data: profile } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", data.user.id)
    .single()

  if(profile?.avatar_url){
    avatar.src = profile.avatar_url
  }
}

/* VIEW */
window.viewProduct=id=>{
  window.location.href="product.html?id="+id
}

loadProducts()
loadAvatar()
</script>

</body>
</html>
