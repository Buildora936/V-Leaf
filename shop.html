<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - V~Leaf</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  padding-bottom: 80px;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:1px solid #eee;
  z-index:100;
}

.logo{
  width:40px;
}

.search{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:#f5f5f5;
  padding:8px 12px;
  border-radius:25px;
}

.search input{
  border:none;
  outline:none;
  background:transparent;
  width:100%;
}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.filters button{
  padding:8px 15px;
  border-radius:20px;
  border:1px solid #ddd;
  background:white;
  white-space:nowrap;
}

.filters button.active{
  background:black;
  color:white;
}

/* ADVANCED FILTER */
.advanced{
  display:flex;
  gap:8px;
  padding:10px;
}

.advanced select,
.advanced input{
  padding:8px;
  border:1px solid #ddd;
  border-radius:10px;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(170px,1fr));
  gap:15px;
  padding:10px;
}

/* CARD */
.card-wrapper{
  position:relative;
}

.card{
  border-radius:15px;
  overflow:hidden;
  background:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
}

.card-content{
  padding:10px;
}

.price{
  font-weight:bold;
}

.old-price{
  text-decoration:line-through;
  color:#888;
  font-size:12px;
}

/* BADGE */
.badge{
  position:absolute;
  top:8px;
  left:8px;
  background:#39FF14;
  font-size:11px;
  padding:4px 6px;
  border-radius:5px;
  font-weight:bold;
}

/* LOADING */
.loading{
  text-align:center;
  padding:40px;
  color:#999;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:65px;
  background:white;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom-nav a{
  text-decoration:none;
  font-size:12px;
  color:#444;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom-nav i{
  font-size:20px;
}

.nav-avatar{
  width:24px;
  height:24px;
  border-radius:50%;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <img src="V-Leaf logo.png" class="logo">

  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="searchInput" placeholder="Search products...">
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="active" onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('cheap')">Under $50</button>
  <button onclick="filterProducts('premium')">Premium</button>
</div>

<!-- ADVANCED FILTER -->
<div class="advanced">
  <select id="sort">
    <option value="">Sort</option>
    <option value="low">Price low</option>
    <option value="high">Price high</option>
  </select>

  <input type="number" id="minPrice" placeholder="Min price">
  <input type="number" id="maxPrice" placeholder="Max price">
</div>

<!-- PRODUCTS -->
<div class="products" id="products">
  <div class="loading">Loading products...</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="shop.html">
    <i class="fa-solid fa-grid-2"></i>
    <span>Shop</span>
  </a>

  <a href="cart.html">
    <i class="fa-solid fa-cart-shopping"></i>
    <span>Cart</span>
  </a>

  <a href="profile.html">
    <img src="https://via.placeholder.com/40" class="nav-avatar" id="avatar">
    <span>Profile</span>
  </a>

</div>

<script type="module">
import { supabase } from "./supabase.js"

let allProducts = []

async function loadProducts(){

  const { data, error } = await supabase
    .from("products")
    .select("*")

  if(error){
    document.getElementById("products").innerHTML = "Error loading products"
    return
  }

  allProducts = data || []
  displayProducts(allProducts)
}

/* DISPLAY */
function displayProducts(list){

  if(!list.length){
    document.getElementById("products").innerHTML = "No products"
    return
  }

  let html = ""

  list.forEach(p=>{
    html += `
      <div class="card-wrapper">
        <div class="badge">HOT</div>

        <div class="card" onclick="viewProduct('${p.id}')">
          <img src="${p.image || ''}">
          <div class="card-content">
            <h3>${p.name}</h3>
            <div>
              <span class="price">$${p.price}</span>
              <span class="old-price">$${Math.round(p.price*1.3)}</span>
            </div>
          </div>
        </div>
      </div>
    `
  })

  document.getElementById("products").innerHTML = html
}

/* SEARCH LIVE */
document.getElementById("searchInput").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase()

  displayProducts(
    allProducts.filter(p =>
      p.name.toLowerCase().includes(val)
    )
  )
})

/* FILTER BASIC */
window.filterProducts = function(type){

  document.querySelectorAll(".filters button")
    .forEach(b=>b.classList.remove("active"))

  event.target.classList.add("active")

  if(type==="cheap"){
    displayProducts(allProducts.filter(p=>p.price<50))
  }
  else if(type==="premium"){
    displayProducts(allProducts.filter(p=>p.price>=50))
  }
  else{
    displayProducts(allProducts)
  }
}

/* ADV FILTER */
document.getElementById("sort").onchange = applyFilters
document.getElementById("minPrice").oninput = applyFilters
document.getElementById("maxPrice").oninput = applyFilters

function applyFilters(){

  let list = [...allProducts]

  const min = parseFloat(minPrice.value) || 0
  const max = parseFloat(maxPrice.value) || Infinity

  list = list.filter(p => p.price >= min && p.price <= max)

  if(sort.value==="low") list.sort((a,b)=>a.price-b.price)
  if(sort.value==="high") list.sort((a,b)=>b.price-a.price)

  displayProducts(list)
}

/* VIEW PRODUCT */
window.viewProduct = function(id){
  window.location.href = "product.html?id=" + id
}

/* PROFILE AVATAR */
async function loadAvatar(){

  const { data } = await supabase.auth.getUser()
  if(!data.user) return

  const { data: profile } = await supabase
    .from("profiles")
    .select("avatar_url")
    .eq("id", data.user.id)
    .single()

  if(profile?.avatar_url){
    document.getElementById("avatar").src = profile.avatar_url
  }
}

loadProducts()
loadAvatar()
</script>

</body>
</html>
