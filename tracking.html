<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking - V~Leaf</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* HEADER */
header{
  padding:15px;
  background:white;
  border-bottom:1px solid #eee;
  display:flex;
  align-items:center;
  gap:10px;
}

.back{
  font-size:20px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:20px auto;
  padding:20px;
}

/* ORDER CARD */
.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* STATUS */
.status{
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.pending{background:orange;color:white;}
.paid{background:green;color:white;}
.shipped{background:#111;color:white;}
.delivered{background:#39FF14;color:black;}

/* TIMELINE */
.timeline{
  margin-top:30px;
  position:relative;
  padding-left:30px;
}

.line{
  position:absolute;
  left:10px;
  top:0;
  bottom:0;
  width:2px;
  background:#ddd;
}

.step{
  margin-bottom:25px;
  position:relative;
}

.dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#ddd;
  position:absolute;
  left:-26px;
  top:4px;
}

.step.active .dot{
  background:#39FF14;
  box-shadow:0 0 10px #39FF14;
  animation:pulse 1.5s infinite;
}

.step.done .dot{
  background:black;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

/* LABEL */
.step p{
  margin:0;
}

/* LIVE BADGE */
.live{
  margin-top:10px;
  display:inline-block;
  font-size:12px;
  background:#eee;
  padding:4px 10px;
  border-radius:20px;
}
</style>
</head>

<body>

<header>
  <span class="back" onclick="history.back()">←</span>
  <strong>Tracking</strong>
</header>

<div class="container">
  <div id="tracking">Loading...</div>
</div>

<script type="module">
import { supabase } from "./supabase.js"

const orderId = new URLSearchParams(window.location.search).get("id")

let currentOrder = null

async function loadTracking(){

  const { data } = await supabase
    .from("orders")
    .select("*")
    .eq("id", orderId)
    .single()

  if(!data){
    document.getElementById("tracking").innerHTML = "Order not found"
    return
  }

  currentOrder = data

  render(data)
}

/* STATUS FLOW */
function getSteps(status){

  const steps = [
    { key:"pending", label:"Order placed" },
    { key:"paid", label:"Payment confirmed" },
    { key:"shipped", label:"Shipped" },
    { key:"delivered", label:"Delivered" }
  ]

  let reached = false

  return steps.map(s => {

    if(s.key === status) reached = true

    return {
      ...s,
      done: steps.indexOf(s) < steps.findIndex(x => x.key === status),
      active: s.key === status
    }
  })
}

/* RENDER */
function render(order){

  const steps = getSteps(order.status)

  let html = `
    <div class="card">

      <h3>Order #${order.id}</h3>

      <span class="status ${order.status}">
        ${order.status}
      </span>

      <div class="live">Live tracking active</div>

      <div class="timeline">
        <div class="line"></div>
  `

  steps.forEach(s => {
    html += `
      <div class="step ${s.done ? "done" : ""} ${s.active ? "active" : ""}">
        <div class="dot"></div>
        <p>${s.label}</p>
      </div>
    `
  })

  html += `
      </div>
    </div>
  `

  document.getElementById("tracking").innerHTML = html
}

/* REALTIME UPDATE */
function subscribe(){

  supabase
    .channel("orders-track")
    .on(
      "postgres_changes",
      {
        event:"UPDATE",
        schema:"public",
        table:"orders",
        filter:`id=eq.${orderId}`
      },
      payload => {
        render(payload.new)
      }
    )
    .subscribe()
}

loadTracking()
subscribe()
</script>

</body>
</html>
